<div class="toast" id="toast"></div>

<script>
const API = '';
let DATA = { estoque:[], vendas:[], vendasSem:[], caixa:[], investidores:[] };

async function api(method, path, body) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + '/api' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

async function loadAll() {
  const [estoque, vendas, vendasSem, caixa, investidores] = await Promise.all([
    api('GET','/estoque'), api('GET','/vendas'), api('GET','/vendas_sem'),
    api('GET','/caixa'), api('GET','/investidores')
  ]);
  DATA = { estoque, vendas, vendasSem, caixa, investidores };
  updateBadges();
}

function updateBadges() {
  document.getElementById('badge-estoque').textContent = DATA.estoque.length;
  document.getElementById('badge-vendas').textContent = DATA.vendas.length + DATA.vendasSem.length;
  document.getElementById('badge-caixa').textContent = DATA.caixa.length;
  document.getElementById('badge-inv').textContent = DATA.investidores.length;
}

const pageTitles = {dashboard:'Dashboard',estoque:'Estoque de Cotas',vendas:'Controle de Vendas',caixa:'Fluxo de Caixa',investidores:'Gestão de Investidores'};
function goTo(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>{ if(n.getAttribute('onclick')&&n.getAttribute('onclick').includes("'"+page+"'")) n.classList.add('active'); });
  document.getElementById('page-title').textContent = pageTitles[page]||page;
  loadAll().then(()=>{
    if(page==='dashboard') renderDashboard();
    if(page==='estoque') renderEstoque();
    if(page==='vendas') renderVendas();
    if(page==='caixa') renderCaixa();
    if(page==='investidores') renderInvestidores();
  });
}

function setTab(tab,el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-contemp').style.display = tab==='contemp'?'':'none';
  document.getElementById('tab-sem').style.display = tab==='sem'?'':'none';
  if(tab==='contemp') renderVendas(); else renderVendasSem();
}

// ── DASHBOARD ──
function renderDashboard() {
  const { estoque, vendas, vendasSem, caixa, investidores } = DATA;
  const contemp = estoque.filter(c=>c.situacao==='CONTEMPLADA');
  const atrasadas = estoque.filter(c=>(+c.atraso||0)>0);
  const totalCredito = estoque.reduce((a,c)=>a+(+c.credito||0),0);
  const rec = caixa.filter(l=>l.tipo==='RECEITA').reduce((a,c)=>a+(+c.valor||0),0);
  const desp = caixa.filter(l=>l.tipo==='DESPESA').reduce((a,c)=>a+(+c.valor||0),0);
  const res = rec - desp;

  document.getElementById('dash-kpis').innerHTML = `
    <div class="kpi-card blue"><div class="kpi-label">Cotas em Estoque</div><div class="kpi-value blue">${estoque.length}</div><div class="kpi-sub">Crédito: ${fmt(totalCredito)}</div></div>
    <div class="kpi-card green"><div class="kpi-label">Total Vendas</div><div class="kpi-value green">${vendas.length+vendasSem.length}</div><div class="kpi-sub">${vendas.length} contempl · ${vendasSem.length} s/contempl</div></div>
    <div class="kpi-card ${res>=0?'green':'red'}"><div class="kpi-label">Resultado Caixa</div><div class="kpi-value ${res>=0?'green':'red'}">${fmtSinal(res)}</div><div class="kpi-sub">Rec: ${fmt(rec)} | Desp: ${fmt(desp)}</div></div>
    <div class="kpi-card amber"><div class="kpi-label">Contempladas Disponíveis</div><div class="kpi-value amber">${contemp.length}</div><div class="kpi-sub">Prontas para venda</div></div>
    <div class="kpi-card ${atrasadas.length>0?'red':'green'}"><div class="kpi-label">Cotas em Atraso</div><div class="kpi-value ${atrasadas.length>0?'red':'green'}">${atrasadas.length}</div><div class="kpi-sub">${atrasadas.length===0?'Tudo em dia':'Verificar!'}</div></div>
    <div class="kpi-card dark"><div class="kpi-label">Investidores</div><div class="kpi-value">${investidores.length}</div><div class="kpi-sub">carteiras ativas</div></div>
  `;

  const meses = {};
  caixa.forEach(l=>{ if(!meses[l.mes]) meses[l.mes]={rec:0,desp:0}; if(l.tipo==='RECEITA') meses[l.mes].rec+=+l.valor||0; else meses[l.mes].desp+=+l.valor||0; });
  const maxVal = Math.max(...Object.values(meses).map(m=>Math.max(m.rec,m.desp)),1);
  let chartHtml = '';
  Object.entries(meses).slice(-4).forEach(([mes,val])=>{
    const rP=Math.max((val.rec/maxVal)*100,2).toFixed(0);
    const dP=Math.max((val.desp/maxVal)*100,2).toFixed(0);
    const r=val.rec-val.desp;
    chartHtml+=`<div class="chart-bar-row"><div class="chart-month">${mes}</div><div style="flex:1"><div class="chart-bar-row" style="margin-bottom:4px"><div style="width:36px;font-size:10px;color:var(--muted)">REC</div><div class="chart-track"><div class="chart-fill pos" style="width:${rP}%">${fmt(val.rec)}</div></div></div><div class="chart-bar-row" style="margin-bottom:0"><div style="width:36px;font-size:10px;color:var(--muted)">DESP</div><div class="chart-track"><div class="chart-fill neg" style="width:${dP}%">${fmt(val.desp)}</div></div></div></div><div class="chart-val ${r>=0?'text-green':'text-red'}">${fmtSinal(r)}</div></div>`;
  });
  document.getElementById('dash-chart').innerHTML = chartHtml||'<div class="empty-state"><div class="icon">📊</div><p>Nenhum lançamento</p></div>';

  const motos=estoque.filter(c=>c.categoria==='MOTO').length;
  const carros=estoque.filter(c=>c.categoria==='CARRO').length;
  const imoveis=estoque.filter(c=>c.categoria==='IMÓVEL').length;
  const tot=estoque.length||1;
  document.getElementById('dash-estoque-chart').innerHTML = `
    <div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>🏍️ Motos</span><span class="text-blue"><b>${motos}</b> (${((motos/tot)*100).toFixed(0)}%)</span></div><div class="progress"><div class="progress-bar-fill" style="width:${(motos/tot)*100}%;background:var(--blue)"></div></div></div>
    <div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>🚗 Carros</span><span class="text-amber"><b>${carros}</b> (${((carros/tot)*100).toFixed(0)}%)</span></div><div class="progress"><div class="progress-bar-fill" style="width:${(carros/tot)*100}%;background:var(--amber)"></div></div></div>
    <div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>🏠 Imóveis</span><span class="text-green"><b>${imoveis}</b> (${((imoveis/tot)*100).toFixed(0)}%)</span></div><div class="progress"><div class="progress-bar-fill" style="width:${(imoveis/tot)*100}%;background:var(--green)"></div></div></div>
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border)"><div style="display:flex;justify-content:space-between;font-size:13px"><span>✅ Contempladas prontas</span><span class="text-green"><b>${contemp.length}</b></span></div><div style="display:flex;justify-content:space-between;font-size:13px;margin-top:8px"><span>⚠️ Com atraso</span><span class="${atrasadas.length>0?'text-red':'text-green'}"><b>${atrasadas.length}</b></span></div></div>
  `;

  let al='';
  if(contemp.length>0) al+=`<div class="alert alert-green">✅ <div><b>${contemp.length} cota(s) contemplada(s)</b> pronta(s) para venda imediata!</div></div>`;
  if(atrasadas.length>0) al+=`<div class="alert alert-red">⚠️ <div><b>${atrasadas.length} cota(s) com atraso:</b> ${atrasadas.map(c=>`Grupo ${c.grupo}/${c.cota}`).join(', ')}</div></div>`;
  if(res<0) al+=`<div class="alert alert-red">📉 <div>Resultado de caixa <b>negativo: ${fmtSinal(res)}</b>. Verifique as despesas.</div></div>`;
  const pend=vendas.filter(v=>v.status==='PENDENTE');
  if(pend.length>0) al+=`<div class="alert alert-amber">⏳ <div><b>${pend.length} venda(s) pendente(s):</b> ${pend.map(v=>v.cliente).join(', ')}</div></div>`;
  if(!al) al='<div class="alert alert-green">✅ <div><b>Tudo em ordem!</b> Nenhum alerta no momento.</div></div>';
  document.getElementById('dash-alertas').innerHTML = al;
}

// ── ESTOQUE ──
function renderEstoque() {
  const q=(document.getElementById('search-estoque')?.value||'').toLowerCase();
  const sit=document.getElementById('fil-sit')?.value||'';
  const cat=document.getElementById('fil-cat')?.value||'';
  let lista=DATA.estoque.filter(c=>{
    const m=!q||[c.grupo,c.cota,c.investidor,c.adm].join(' ').toLowerCase().includes(q);
    return m&&(!sit||c.situacao===sit)&&(!cat||c.categoria===cat);
  });
  document.getElementById('count-estoque').textContent=lista.length+' cotas';
  const tb=document.getElementById('tbody-estoque');
  if(!lista.length){tb.innerHTML=`<tr><td colspan="10"><div class="empty-state"><div class="icon">📦</div><p>Nenhuma cota</p></div></td></tr>`;return;}
  tb.innerHTML=lista.map(c=>`<tr>
    <td><b>${c.grupo}</b>/<span class="mono">${c.cota}</span></td>
    <td>${c.adm}</td><td>${c.investidor}</td>
    <td><span class="badge ${c.categoria==='MOTO'?'badge-blue':c.categoria==='CARRO'?'badge-amber':'badge-green'}">${c.categoria}</span></td>
    <td class="mono text-blue">${fmt(c.credito)}</td>
    <td class="mono">${fmt(c.parcela)}</td>
    <td><span class="badge ${c.situacao==='CONTEMPLADA'?'badge-green':c.situacao==='SUSTENTAÇÃO'?'badge-red':'badge-dark'}">${c.situacao}</span></td>
    <td class="text-muted mono" style="font-size:11px">${c.vcto||'—'}</td>
    <td>${(+c.atraso||0)>0?`<span class="badge badge-red">${c.atraso}m</span>`:'<span class="badge badge-green">OK</span>'}</td>
    <td><button class="btn btn-danger btn-sm" onclick="del('estoque',${c.id})">🗑</button></td>
  </tr>`).join('');
}

// ── VENDAS ──
function renderVendas() {
  const q=(document.getElementById('search-vendas')?.value||'').toLowerCase();
  let lista=DATA.vendas.filter(v=>!q||[v.cliente,v.grupo,v.cota,v.pertence].join(' ').toLowerCase().includes(q));
  document.getElementById('count-vendas').textContent=lista.length+' vendas';
  const tb=document.getElementById('tbody-vendas');
  if(!lista.length){tb.innerHTML=`<tr><td colspan="11"><div class="empty-state"><div class="icon">🤝</div><p>Nenhuma venda</p></div></td></tr>`;return;}
  tb.innerHTML=lista.map(c=>{const f=(+c.entrada||0)-(+c.pago_cli||0);return`<tr>
    <td>${c.adm}</td><td><b>${c.grupo}</b>/<span class="mono">${c.cota}</span></td>
    <td><b>${c.cliente}</b><br><span class="text-muted" style="font-size:11px">${c.pertence}</span></td>
    <td class="mono text-blue">${fmt(c.credito)}</td><td class="mono">${fmt(c.entrada)}</td>
    <td class="mono">${fmt(c.lance)}</td><td class="mono text-green">${fmt(c.pago_cli)}</td>
    <td class="mono ${f>0?'text-red':'text-green'}">${f>0?fmt(f):'Quitado'}</td>
    <td class="text-muted" style="font-size:11px">${c.data||'—'}</td>
    <td><span class="badge ${c.status==='QUITADO'?'badge-green':c.status==='PAGO PARCIAL'?'badge-amber':'badge-red'}">${c.status}</span></td>
    <td><button class="btn btn-danger btn-sm" onclick="del('vendas',${c.id})">🗑</button></td>
  </tr>`;}).join('');
}

function renderVendasSem() {
  const q=(document.getElementById('search-vsem')?.value||'').toLowerCase();
  let lista=DATA.vendasSem.filter(v=>!q||[v.investidor,v.grupo,v.cota].join(' ').toLowerCase().includes(q));
  document.getElementById('count-vsem').textContent=lista.length+' cotas';
  const tb=document.getElementById('tbody-vsem');
  if(!lista.length){tb.innerHTML=`<tr><td colspan="8"><div class="empty-state"><div class="icon">📋</div><p>Nenhum registro</p></div></td></tr>`;return;}
  tb.innerHTML=lista.map(c=>`<tr>
    <td><b>${c.grupo}</b>/<span class="mono">${c.cota}</span></td><td>${c.investidor}</td><td>${c.adm}</td>
    <td class="mono text-blue">${fmt(c.credito)}</td><td class="mono">${fmt(c.parcela)}</td>
    <td><span class="badge ${c.categoria==='IMÓVEL'?'badge-green':c.categoria==='MOTO'?'badge-blue':'badge-amber'}">${c.categoria}</span></td>
    <td>${c.vendedor}</td>
    <td><button class="btn btn-danger btn-sm" onclick="del('vendas_sem',${c.id})">🗑</button></td>
  </tr>`).join('');
}

// ── CAIXA ──
function renderCaixa() {
  const mesSel=document.getElementById('caixa-mes')?.value||'';
  const tipoSel=document.getElementById('fil-tipo')?.value||'';
  const mesesUniq=[...new Set(DATA.caixa.map(l=>l.mes))].sort();
  const sel=document.getElementById('caixa-mes');
  const cur=sel.value;
  sel.innerHTML='<option value="">Todos os meses</option>'+mesesUniq.map(m=>`<option value="${m}"${m===cur?' selected':''}>${m}</option>`).join('');
  let lista=DATA.caixa;
  if(mesSel) lista=lista.filter(l=>l.mes===mesSel);
  if(tipoSel) lista=lista.filter(l=>l.tipo===tipoSel);
  const rec=lista.filter(l=>l.tipo==='RECEITA').reduce((a,c)=>a+(+c.valor||0),0);
  const desp=lista.filter(l=>l.tipo==='DESPESA').reduce((a,c)=>a+(+c.valor||0),0);
  const res=rec-desp;
  document.getElementById('caixa-kpis').innerHTML=`
    <div class="kpi-card green"><div class="kpi-label">Total Receitas</div><div class="kpi-value green">${fmt(rec)}</div><div class="kpi-sub">${lista.filter(l=>l.tipo==='RECEITA').length} lançamentos</div></div>
    <div class="kpi-card red"><div class="kpi-label">Total Despesas</div><div class="kpi-value red">${fmt(desp)}</div><div class="kpi-sub">${lista.filter(l=>l.tipo==='DESPESA').length} lançamentos</div></div>
    <div class="kpi-card ${res>=0?'green':'red'}"><div class="kpi-label">Resultado</div><div class="kpi-value ${res>=0?'green':'red'}">${fmtSinal(res)}</div><div class="kpi-sub">${res>=0?'✅ Positivo':'⚠️ Negativo'}</div></div>
  `;
  document.getElementById('count-caixa').textContent=lista.length+' lançamentos';
  const tb=document.getElementById('tbody-caixa');
  if(!lista.length){tb.innerHTML=`<tr><td colspan="7"><div class="empty-state"><div class="icon">💵</div><p>Nenhum lançamento</p></div></td></tr>`;return;}
  tb.innerHTML=lista.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).map(l=>`<tr>
    <td class="mono" style="font-size:12px">${l.data||'—'}</td>
    <td><span class="badge ${l.tipo==='RECEITA'?'badge-green':'badge-red'}">${l.tipo}</span></td>
    <td><b>${l.descricao}</b></td>
    <td><span class="badge badge-dark">${l.cat}</span></td>
    <td class="mono ${l.tipo==='RECEITA'?'text-green':'text-red'}" style="font-size:14px;font-weight:700">${l.tipo==='RECEITA'?'+':'-'}${fmt(l.valor)}</td>
    <td><span class="badge ${l.status==='PG'?'badge-green':'badge-amber'}">${l.status}</span></td>
    <td><button class="btn btn-danger btn-sm" onclick="del('caixa',${l.id})">🗑</button></td>
  </tr>`).join('');
}

// ── INVESTIDORES ──
function renderInvestidores() {
  const q=(document.getElementById('search-inv')?.value||'').toLowerCase();
  let lista=DATA.investidores.filter(i=>!q||[i.nome,i.contrato,i.grupo].join(' ').toLowerCase().includes(q));
  const tc=lista.reduce((a,c)=>a+(+c.credito||0),0);
  const tp=lista.reduce((a,c)=>a+(+c.parcela||0),0);
  const tcom=lista.reduce((a,c)=>a+((+c.credito||0)*(+c.comissao||0)),0);
  document.getElementById('inv-kpis').innerHTML=`
    <div class="kpi-card blue"><div class="kpi-label">Total Investidores</div><div class="kpi-value blue">${lista.length}</div><div class="kpi-sub">${lista.filter(i=>i.status==='ATIVO').length} ativos</div></div>
    <div class="kpi-card amber"><div class="kpi-label">Crédito Total</div><div class="kpi-value amber">${fmt(tc)}</div><div class="kpi-sub">em carteira</div></div>
    <div class="kpi-card green"><div class="kpi-label">Comissão Prevista</div><div class="kpi-value green">${fmt(tcom)}</div></div>
    <div class="kpi-card dark"><div class="kpi-label">Parcelas/Mês</div><div class="kpi-value">${fmt(tp)}</div></div>
  `;
  const tb=document.getElementById('tbody-inv');
  if(!lista.length){tb.innerHTML=`<tr><td colspan="11"><div class="empty-state"><div class="icon">🏦</div><p>Nenhum investidor</p></div></td></tr>`;return;}
  tb.innerHTML=lista.map(i=>`<tr>
    <td><b>${i.nome}</b></td><td class="mono text-muted" style="font-size:11px">${i.contrato||'—'}</td>
    <td>${i.adm}</td><td><b>${i.grupo}</b>/<span class="mono">${i.cota}</span></td>
    <td class="mono text-blue">${fmt(i.credito)}</td><td class="mono">${fmt(i.parcela)}/mês</td>
    <td class="text-muted">${i.prazo||'—'}m</td>
    <td class="mono">${((+i.comissao||0)*100).toFixed(1)}%</td>
    <td class="mono text-green">${fmt((+i.credito||0)*(+i.comissao||0))}</td>
    <td><span class="badge ${i.status==='ATIVO'?'badge-green':'badge-dark'}">${i.status}</span></td>
    <td><button class="btn btn-danger btn-sm" onclick="del('investidores',${i.id})">🗑</button></td>
  </tr>`).join('');
}

// ── CRUD ──
async function del(table, id) {
  if(!confirm('Remover este registro?')) return;
  await api('DELETE',`/${table}/${id}`);
  await loadAll();
  if(table==='estoque') renderEstoque();
  else if(table==='vendas') renderVendas();
  else if(table==='vendas_sem') renderVendasSem();
  else if(table==='caixa') renderCaixa();
  else if(table==='investidores') renderInvestidores();
  toast('🗑 Removido com sucesso');
}

async function salvarEstoque() {
  await api('POST','/estoque',{grupo:v('e-grupo'),cota:v('e-cota'),adm:v('e-adm'),investidor:v('e-investidor'),credito:+v('e-credito')||0,parcela:+v('e-parcela')||0,pago:+v('e-pago')||0,categoria:v('e-categoria'),situacao:v('e-situacao'),vcto:v('e-vcto'),meses:+v('e-meses')||0,atraso:+v('e-atraso')||0,obs:v('e-obs')});
  closeModal('modal-estoque'); await loadAll(); renderEstoque(); toast('✅ Cota adicionada!');
}
async function salvarVenda() {
  await api('POST','/vendas',{adm:v('v-adm'),grupo:v('v-grupo'),cota:v('v-cota'),credito:+v('v-credito')||0,vpago:+v('v-vpago')||0,lance:+v('v-lance')||0,agil:+v('v-agil')||0,entrada:+v('v-entrada')||0,parc_ant:0,parc_nova:0,pertence:v('v-pertence'),cliente:v('v-cliente'),pago_cli:+v('v-pago-cli')||0,data:v('v-data'),banco:v('v-banco'),vcto:'',status:v('v-status'),obs:v('v-obs')});
  closeModal('modal-venda'); await loadAll(); renderVendas(); toast('✅ Venda registrada!');
}
async function salvarVendaSem() {
  await api('POST','/vendas_sem',{grupo:v('vs-grupo'),cota:v('vs-cota'),investidor:v('vs-investidor'),adm:v('vs-adm'),credito:+v('vs-credito')||0,parcela:+v('vs-parcela')||0,categoria:v('vs-categoria'),vendedor:v('vs-vendedor'),meses:0,vcto:''});
  closeModal('modal-venda-sem'); await loadAll(); renderVendasSem(); toast('✅ Registrado!');
}
async function salvarReceita() {
  await api('POST','/caixa',{tipo:'RECEITA',data:v('r-data'),descricao:v('r-desc'),cat:v('r-cat'),valor:+v('r-valor')||0,status:v('r-status'),mes:v('r-mes'),obs:''});
  closeModal('modal-receita'); await loadAll(); renderCaixa(); toast('💚 Receita lançada!');
}
async function salvarDespesa() {
  await api('POST','/caixa',{tipo:'DESPESA',data:v('d-data'),descricao:v('d-desc'),cat:v('d-cat'),valor:+v('d-valor')||0,status:v('d-status'),mes:v('d-mes'),obs:''});
  closeModal('modal-despesa'); await loadAll(); renderCaixa(); toast('🔴 Despesa lançada!');
}
async function salvarInvestidor() {
  await api('POST','/investidores',{nome:v('i-nome'),contrato:v('i-contrato'),adm:v('i-adm'),grupo:v('i-grupo'),cota:v('i-cota'),credito:+v('i-credito')||0,parcela:+v('i-parcela')||0,prazo:+v('i-prazo')||0,lance:0,comissao:+v('i-comissao')||0.02,status:v('i-status'),obs:''});
  closeModal('modal-investidor'); await loadAll(); renderInvestidores(); toast('🏦 Investidor salvo!');
}

async function exportarDados() {
  window.open('/api/export','_blank');
  toast('💾 Exportando backup...');
}

// ── UTILS ──
function v(id){const el=document.getElementById(id);return el?el.value:'';}
function fmt(n){return 'R$ '+(+n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtSinal(n){const num=+n||0;return(num>=0?'+':'')+fmt(num);}
function openModal(id){document.getElementById(id).classList.add('open');const today=new Date().toISOString().split('T')[0];document.querySelectorAll('#'+id+' input[type=date]').forEach(el=>{if(!el.value)el.value=today;});}
function closeModal(id){document.getElementById(id).classList.remove('open');}
document.querySelectorAll('.modal-overlay').forEach(o=>{o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open');});});
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),3000);}

// ── INIT ──
document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
loadAll().then(()=>{ renderDashboard(); updateBadges(); });
</script>
