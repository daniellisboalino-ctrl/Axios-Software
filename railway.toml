<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axios — Sistema de Gestão</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5f3ef;--surface:#ffffff;--surface2:#f0ede8;--border:#e2ddd6;--dark:#1a1612;--dark2:#2e2820;--ink:#3d3530;--muted:#9a9189;--green:#1a7a4a;--green-light:#e8f5ee;--green-mid:#2da05f;--red:#c0392b;--red-light:#fdecea;--amber:#b45309;--amber-light:#fef3c7;--blue:#1e5fa8;--blue-light:#eff6ff;--accent:#c8a96e;--accent2:#8b5e3c;}
*{margin:0;padding:0;box-sizing:border-box;}html{font-size:15px;}
body{font-family:'Lato',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;}
.sidebar{width:240px;background:var(--dark);min-height:100vh;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid #ffffff12;}
.logo-tag{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
.logo-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:#fff;margin-top:2px;line-height:1;}
.logo-sub{font-size:11px;color:#ffffff55;margin-top:4px;}
.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-section{padding:6px 24px 4px;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#ffffff30;font-family:'JetBrains Mono',monospace;margin-top:8px;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;cursor:pointer;color:#ffffff80;font-size:13.5px;transition:all 0.15s;border-left:3px solid transparent;}
.nav-item:hover{background:#ffffff08;color:#fff;}
.nav-item.active{background:#ffffff12;color:#fff;border-left-color:var(--accent);}
.nav-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0;}
.nav-badge{margin-left:auto;background:var(--accent);color:var(--dark);font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:99px;}
.sidebar-footer{padding:16px 24px;border-top:1px solid #ffffff12;font-size:11px;color:#ffffff30;font-family:'JetBrains Mono',monospace;}
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.page-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--dark);}
.topbar-date{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:7px;font-family:'Lato',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all 0.15s;}
.btn-primary{background:var(--dark);color:#fff;}.btn-primary:hover{background:var(--dark2);}
.btn-success{background:var(--green);color:#fff;}.btn-success:hover{background:#15633b;}
.btn-danger{background:var(--red);color:#fff;}.btn-danger:hover{background:#a93226;}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--border);}.btn-ghost:hover{background:var(--surface2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.content{padding:32px;flex:1;}
.page{display:none;}.page.active{display:block;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:28px;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;position:relative;overflow:hidden;}
.kpi-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:10px 10px 0 0;}
.kpi-card.green::after{background:var(--green-mid);}.kpi-card.red::after{background:var(--red);}
.kpi-card.amber::after{background:var(--amber);}.kpi-card.blue::after{background:var(--blue);}.kpi-card.dark::after{background:var(--dark);}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.kpi-value{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--dark);line-height:1;}
.kpi-value.green{color:var(--green);}.kpi-value.red{color:var(--red);}.kpi-value.amber{color:var(--amber);}.kpi-value.blue{color:var(--blue);}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:5px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--dark);}
.card-body{padding:20px;}
.badge{display:inline-flex;align-items:center;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.5px;padding:3px 9px;border-radius:99px;font-weight:500;}
.badge-green{background:var(--green-light);color:var(--green);}.badge-red{background:var(--red-light);color:var(--red);}
.badge-amber{background:var(--amber-light);color:var(--amber);}.badge-blue{background:var(--blue-light);color:var(--blue);}.badge-dark{background:var(--surface2);color:var(--ink);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
thead tr{background:var(--surface2);}
th{padding:11px 14px;text-align:left;font-size:10px;font-family:'JetBrains Mono',monospace;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.mono{font-family:'JetBrains Mono',monospace;font-size:12.5px;}
.text-green{color:var(--green);font-weight:700;}.text-red{color:var(--red);font-weight:700;}
.text-amber{color:var(--amber);font-weight:700;}.text-blue{color:var(--blue);}.text-muted{color:var(--muted);}
.modal-overlay{display:none;position:fixed;inset:0;background:#00000060;z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px #00000030;animation:modalIn 0.2s ease;}
@keyframes modalIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);line-height:1;}
.modal-body{padding:24px;}.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-group{display:flex;flex-direction:column;gap:5px;}.form-group.full{grid-column:1/-1;}
label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--ink);}
input,select,textarea{padding:9px 12px;border:1px solid var(--border);border-radius:7px;font-family:'Lato',sans-serif;font-size:14px;color:var(--ink);background:var(--surface);outline:none;transition:border-color 0.15s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent2);}
textarea{resize:vertical;min-height:70px;}
.alert{padding:12px 16px;border-radius:8px;font-size:13px;display:flex;gap:10px;margin-bottom:16px;border:1px solid;}
.alert-green{background:var(--green-light);border-color:#a7d7b8;color:var(--green);}
.alert-red{background:var(--red-light);border-color:#f5b7b1;color:var(--red);}
.alert-amber{background:var(--amber-light);border-color:#fcd34d;color:var(--amber);}
.tabs{display:flex;gap:4px;background:var(--surface2);padding:4px;border-radius:9px;margin-bottom:20px;width:fit-content;}
.tab{padding:7px 18px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:all 0.15s;}
.tab.active{background:var(--surface);color:var(--dark);box-shadow:0 1px 4px #0000001a;}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex:1;min-width:180px;}
.search-box input{border:none;background:none;padding:0;font-size:13.5px;flex:1;}.search-box input:focus{outline:none;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-state .icon{font-size:40px;margin-bottom:12px;}.empty-state p{font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
.toast{position:fixed;bottom:24px;right:24px;background:var(--dark);color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;display:none;align-items:center;gap:10px;box-shadow:0 8px 32px #00000030;}
.toast.show{display:flex;}
.summary-row{background:var(--surface2);font-weight:700;}
.summary-row td{font-family:'JetBrains Mono',monospace;font-size:13px;}
.progress{height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;margin-top:6px;}
.progress-bar-fill{height:100%;border-radius:99px;background:var(--green-mid);transition:width 0.6s;}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.chart-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.chart-month{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:90px;flex-shrink:0;}
.chart-track{flex:1;height:24px;background:var(--surface2);border-radius:5px;overflow:hidden;}
.chart-fill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px;font-family:'JetBrains Mono',monospace;font-size:10px;}
.chart-fill.pos{background:linear-gradient(90deg,#d4edda,#1a7a4a);color:#fff;}
.chart-fill.neg{background:linear-gradient(90deg,#fdecea,#c0392b);color:#fff;}
.chart-val{font-family:'JetBrains Mono',monospace;font-size:11px;width:100px;text-align:right;flex-shrink:0;}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-tag">Sistema</div>
    <div class="logo-name">Axios</div>
    <div class="logo-sub">Gestão de Consórcios · Maringá</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Principal</div>
    <div class="nav-item active" onclick="goTo('dashboard')"><span class="nav-icon">📊</span> Dashboard</div>
    <div class="nav-section">Módulos</div>
    <div class="nav-item" onclick="goTo('estoque')"><span class="nav-icon">📦</span> Estoque de Cotas <span class="nav-badge" id="badge-estoque">0</span></div>
    <div class="nav-item" onclick="goTo('vendas')"><span class="nav-icon">🤝</span> Controle de Vendas <span class="nav-badge" id="badge-vendas">0</span></div>
    <div class="nav-item" onclick="goTo('caixa')"><span class="nav-icon">💵</span> Fluxo de Caixa <span class="nav-badge" id="badge-caixa">0</span></div>
    <div class="nav-item" onclick="goTo('investidores')"><span class="nav-icon">🏦</span> Investidores <span class="nav-badge" id="badge-inv">0</span></div>
    <div class="nav-section">Dados</div>
    <div class="nav-item" onclick="exportarDados()"><span class="nav-icon">💾</span> Exportar Backup</div>
  </nav>
  <div class="sidebar-footer">v2.0 · Axios Maringá</div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Dashboard</div>
    <div class="topbar-date" id="topbar-date"></div>
  </div>
  <div class="content">

    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="kpi-grid" id="dash-kpis"><div class="loading">⏳ Carregando...</div></div>
      <div class="two-col">
        <div class="card"><div class="card-header"><div class="card-title">📈 Fluxo de Caixa</div></div><div class="card-body" id="dash-chart"><div class="loading">⏳</div></div></div>
        <div class="card"><div class="card-header"><div class="card-title">📦 Estoque por Categoria</div></div><div class="card-body" id="dash-estoque-chart"><div class="loading">⏳</div></div></div>
      </div>
      <div class="card"><div class="card-header"><div class="card-title">⚡ Alertas</div></div><div class="card-body" id="dash-alertas"></div></div>
    </div>

    <!-- ESTOQUE -->
    <div class="page" id="page-estoque">
      <div class="toolbar">
        <div class="search-box"><span>🔍</span><input type="text" placeholder="Buscar grupo, cota, investidor..." id="search-estoque" oninput="renderEstoque()"></div>
        <select id="fil-sit" onchange="renderEstoque()" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px">
          <option value="">Todas situações</option><option>S/ CONTEM</option><option>CONTEMPLADA</option><option>SUSTENTAÇÃO</option>
        </select>
        <select id="fil-cat" onchange="renderEstoque()" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px">
          <option value="">Todas categorias</option><option>MOTO</option><option>CARRO</option><option>IMÓVEL</option>
        </select>
        <button class="btn btn-primary" onclick="openModal('modal-estoque')">＋ Nova Cota</button>
      </div>
      <div class="card">
        <div class="card-header"><div class="card-title">Cotas em Estoque</div><span id="count-estoque" class="badge badge-blue">0</span></div>
        <div class="table-wrap"><table><thead><tr><th>Grupo/Cota</th><th>ADM</th><th>Investidor</th><th>Cat.</th><th>Crédito</th><th>Parcela</th><th>Situação</th><th>Vcto</th><th>Atraso</th><th>Ações</th></tr></thead><tbody id="tbody-estoque"><tr><td colspan="10"><div class="loading">⏳</div></td></tr></tbody></table></div>
      </div>
    </div>

    <!-- VENDAS -->
    <div class="page" id="page-vendas">
      <div class="tabs">
        <div class="tab active" onclick="setTab('contemp',this)">Contempladas</div>
        <div class="tab" onclick="setTab('sem',this)">Sem Contemplação</div>
      </div>
      <div id="tab-contemp">
        <div class="toolbar">
          <div class="search-box"><span>🔍</span><input type="text" placeholder="Cliente, grupo, cota..." id="search-vendas" oninput="renderVendas()"></div>
          <button class="btn btn-success" onclick="openModal('modal-venda')">＋ Nova Venda</button>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Vendas Contempladas</div><span id="count-vendas" class="badge badge-green">0</span></div>
          <div class="table-wrap"><table><thead><tr><th>ADM</th><th>Grupo/Cota</th><th>Cliente</th><th>Crédito</th><th>Entrada</th><th>Lance</th><th>Pago</th><th>Falta</th><th>Data</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tbody-vendas"></tbody></table></div>
        </div>
      </div>
      <div id="tab-sem" style="display:none">
        <div class="toolbar">
          <div class="search-box"><span>🔍</span><input type="text" placeholder="Investidor, grupo..." id="search-vsem" oninput="renderVendasSem()"></div>
          <button class="btn btn-success" onclick="openModal('modal-venda-sem')">＋ Nova Venda</button>
        </div>
        <div class="card">
          <div class="card-header"><div class="card-title">Vendidas Sem Contemplação</div><span id="count-vsem" class="badge badge-amber">0</span></div>
          <div class="table-wrap"><table><thead><tr><th>Grupo/Cota</th><th>Investidor</th><th>ADM</th><th>Crédito</th><th>Parcela</th><th>Categoria</th><th>Vendida Por</th><th>Ações</th></tr></thead><tbody id="tbody-vsem"></tbody></table></div>
        </div>
      </div>
    </div>

    <!-- CAIXA -->
    <div class="page" id="page-caixa">
      <div class="toolbar">
        <select id="caixa-mes" onchange="renderCaixa()" style="padding:8px 14px;border-radius:8px;border:1px solid var(--border);font-size:13px;font-weight:700"><option value="">Todos os meses</option></select>
        <select id="fil-tipo" onchange="renderCaixa()" style="padding:8px 12px;border-radius:8px;border:1px solid var(--border);font-size:13px">
          <option value="">Rec. e Desp.</option><option value="RECEITA">Só Receitas</option><option value="DESPESA">Só Despesas</option>
        </select>
        <button class="btn btn-success" onclick="openModal('modal-receita')">＋ Receita</button>
        <button class="btn btn-danger" onclick="openModal('modal-despesa')">＋ Despesa</button>
      </div>
      <div class="kpi-grid" id="caixa-kpis"></div>
      <div class="card">
        <div class="card-header"><div class="card-title">Lançamentos</div><span id="count-caixa" class="badge badge-dark">0</span></div>
        <div class="table-wrap"><table><thead><tr><th>Data</th><th>Tipo</th><th>Descrição</th><th>Categoria</th><th>Valor</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tbody-caixa"></tbody></table></div>
      </div>
    </div>

    <!-- INVESTIDORES -->
    <div class="page" id="page-investidores">
      <div class="toolbar">
        <div class="search-box"><span>🔍</span><input type="text" placeholder="Investidor, contrato..." id="search-inv" oninput="renderInvestidores()"></div>
        <button class="btn btn-primary" onclick="openModal('modal-investidor')">＋ Novo Investidor</button>
      </div>
      <div class="kpi-grid" id="inv-kpis"></div>
      <div class="card">
        <div class="card-header"><div class="card-title">Carteira de Investidores</div></div>
        <div class="table-wrap"><table><thead><tr><th>Investidor</th><th>Contrato</th><th>ADM</th><th>Grupo/Cota</th><th>Crédito</th><th>Parcela</th><th>Prazo</th><th>% Comis.</th><th>Prev. Comis.</th><th>Status</th><th>Ações</th></tr></thead><tbody id="tbody-inv"></tbody></table></div>
      </div>
    </div>

  </div>
</main>

<!-- MODAIS -->
<div class="modal-overlay" id="modal-estoque">
  <div class="modal">
    <div class="modal-header"><h3>📦 Nova Cota no Estoque</h3><button class="modal-close" onclick="closeModal('modal-estoque')">×</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="form-group"><label>Grupo</label><input id="e-grupo"></div>
      <div class="form-group"><label>Cota</label><input id="e-cota"></div>
      <div class="form-group"><label>ADM</label><select id="e-adm"><option>YAMAHA</option><option>ITAÚ</option><option>GAZIN</option><option>OUTRO</option></select></div>
      <div class="form-group"><label>Investidor</label><input id="e-investidor"></div>
      <div class="form-group"><label>Crédito (R$)</label><input type="number" id="e-credito" step="0.01"></div>
      <div class="form-group"><label>Parcela (R$)</label><input type="number" id="e-parcela" step="0.01"></div>
      <div class="form-group"><label>Valor Já Pago (R$)</label><input type="number" id="e-pago" step="0.01"></div>
      <div class="form-group"><label>Categoria</label><select id="e-categoria"><option>MOTO</option><option>CARRO</option><option>IMÓVEL</option><option>AUTO</option></select></div>
      <div class="form-group"><label>Situação</label><select id="e-situacao"><option>S/ CONTEM</option><option>CONTEMPLADA</option><option>SUSTENTAÇÃO</option></select></div>
      <div class="form-group"><label>Vencimento</label><input type="date" id="e-vcto"></div>
      <div class="form-group"><label>Prazo (meses)</label><input type="number" id="e-meses"></div>
      <div class="form-group"><label>Atraso (meses)</label><input type="number" id="e-atraso" value="0"></div>
      <div class="form-group full"><label>Observações</label><textarea id="e-obs"></textarea></div>
    </div></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="closeModal('modal-estoque')">Cancelar</button><button class="btn btn-primary" onclick="salvarEstoque()">Salvar</button></div>
  </div>
</div>

<div class="modal-overlay" id="modal-venda">
  <div class="modal">
    <div class="modal-header"><h3>🤝 Nova Venda Contemplada</h3><button class="modal-close" onclick="closeModal('modal-venda')">×</button></div>
    <div class="modal-body"><div class="form-grid">
      <div class="form-group"><label>ADM</label><select id="v-adm"><option>YAMAHA</option><option>ITAÚ</option><option>GAZIN</option></select></div>
      <div class="form-group"><label>Grupo</label><input id="v-grupo"></div>
      <div class="form-group"><label>Cota</label><input id="v-cota"></div>
      <div class="form-group"><label>Crédito</label><input type="number" id="v-credito" step="0.01"></div>
      <div class="form-group"><label>Valor Pago</label><input type="number" id="v-vpago" step="0.01"></div>
      <div class="form-group"><label>Lance</label><input type="number" id="v-lance" step="0.01"></div>
      <div class="form-group"><label>Ágil</label><input type="number" id="v-agil" step="0.01" value="0"></div>
